<!DOCTYPE html>
<html>
<head>
  <title>Mi página</title>
</head>

<body>

  <h1>Bienvenido a mi página</h1>
  <p>Este es un ejemplo de HTML con CSS.</p>

  <!-- BOTÓN -->
  <button onclick="mostrarImagen()">
    Haz clic aquí
  </button>

  <!-- IMAGEN (OCULTA) -->
  <img id="miImagen" src="IMG_3993.jpeg" style="display:none; margin-top:10px; width:200px;">

  <!-- SCRIPT -->
  <script>
    function mostrarImagen() {
      var img = document.getElementById("miImagen");
      if (img.style.display === "none") {
        img.style.display = "block";
      } else {
        img.style.display = "none";
      }
    }
  </script>

</body>
</html>
