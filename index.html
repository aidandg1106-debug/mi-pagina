<!DOCTYPE html>
<html>
<head>
  <title>Mi página</title>
</head>

<body>

  <h1>Bienvenido a mi página</h1>
  <p>Este es un ejemplo de HTML con CSS.</p>

  <!-- BOTÓN -->
  <button onclick="mostrarImagen()">
    Haz clic aquí
  </button>

  <!-- IMAGEN (OCULTA) -->
  <img id="miImagen" src="https://via.placeholder.com/200" style="display:none; margin-top:10px;">

  <!-- SCRIPT -->
  <script>
    function mostrarImagen() {
      document.getElementById("miImagen").style.display = "block";
    }
  </script>

</body>
</html>
